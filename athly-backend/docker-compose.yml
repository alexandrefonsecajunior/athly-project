services:
  db:
    image: postgres:15-alpine
    container_name: iafit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iafit
    ports:
      - '1234:5432'  # host:container - PostgreSQL escuta em 5432 dentro do container
    volumes:
      - iafit_db:/var/lib/postgresql/data

volumes:
  iafit_db:
